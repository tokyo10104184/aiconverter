<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextMimic Studio - 作成</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', 'Noto Sans JP', sans-serif; } .loader { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 20px; height: 20px; animation: spin 1s linear infinite; } @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen pb-20">
    <div id="app" class="max-w-4xl mx-auto">
        <!-- 初期ロード中 -->
        <div v-if="!authInitialized" class="fixed inset-0 z-50 flex items-center justify-center bg-white">
            <div class="loader border-indigo-200 border-t-indigo-600 w-12 h-12"></div>
        </div>

        <header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-10 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">M</div>
                <span class="font-bold text-slate-900">TextMimic Studio</span>
            </div>
            <div class="flex gap-3 items-center">
                <div v-if="user" class="hidden md:flex items-center gap-2 mr-2">
                   <div class="w-8 h-8 rounded-full bg-slate-200 overflow-hidden">
                       <img v-if="user.photoURL" :src="user.photoURL" class="w-full h-full object-cover">
                       <div v-else class="w-full h-full flex items-center justify-center text-slate-500 font-bold text-xs">{{ user.email?.charAt(0).toUpperCase() }}</div>
                   </div>
                   <button @click="logout" class="text-xs text-slate-500 hover:text-red-500 underline">ログアウト</button>
                </div>

                <a href="index.html" class="text-sm font-bold text-slate-500 hover:text-slate-800 flex items-center">キャンセル</a>
                <button @click="publishMaker" :disabled="isPublishing" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold px-4 py-2 rounded-lg transition shadow-md flex items-center gap-2">
                    <span v-if="isPublishing" class="loader w-4 h-4 border-2"></span>
                    <span v-else>公開する 🚀</span>
                </button>
            </div>
        </header>

        <main class="p-6 grid grid-cols-1 lg:grid-cols-2 gap-8 relative">
            <!-- ブロック用オーバーレイ (ログインしていない場合) -->
            <div v-if="!user && authInitialized" class="absolute inset-0 z-40 bg-slate-100/90 backdrop-blur-sm flex items-start justify-center pt-20">
                <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full mx-4 border border-slate-200">
                    <div class="text-center mb-8">
                        <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold text-3xl mx-auto mb-4">M</div>
                        <h2 class="text-2xl font-extrabold text-slate-900">ログインが必要です</h2>
                        <p class="text-slate-500 mt-2 text-sm">作成機能を利用するにはアカウントが必要です。</p>
                    </div>

                    <div class="space-y-4">
                        <button @click="loginWithGoogle" class="w-full bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold py-3 rounded-xl transition flex items-center justify-center gap-2 shadow-sm">
                            <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                            Googleでログイン
                        </button>

                        <div class="relative flex py-2 items-center">
                            <div class="flex-grow border-t border-slate-200"></div>
                            <span class="flex-shrink-0 mx-4 text-slate-400 text-xs font-bold">OR</span>
                            <div class="flex-grow border-t border-slate-200"></div>
                        </div>

                        <!-- Email Login Form -->
                        <form @submit.prevent="handleEmailAuth" class="space-y-3">
                            <div>
                                <input v-model="email" type="email" placeholder="メールアドレス" class="w-full p-3 border border-slate-300 rounded-xl bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none transition" required>
                            </div>
                            <div>
                                <input v-model="password" type="password" placeholder="パスワード" class="w-full p-3 border border-slate-300 rounded-xl bg-slate-50 focus:ring-2 focus:ring-indigo-500 outline-none transition" required minlength="6">
                            </div>

                            <button type="submit" :disabled="authLoading" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-xl transition shadow flex justify-center items-center">
                                <span v-if="authLoading" class="loader w-4 h-4 border-2"></span>
                                <span v-else>{{ authMode === 'login' ? 'ログイン' : 'アカウント登録' }}</span>
                            </button>
                        </form>

                        <div v-if="authError" class="text-red-500 text-xs text-center font-bold bg-red-50 p-2 rounded-lg">
                            {{ authError }}
                        </div>

                        <div class="text-center">
                            <button @click="toggleAuthMode" class="text-indigo-600 text-xs font-bold hover:underline">
                                {{ authMode === 'login' ? 'アカウントをお持ちでない方は登録' : 'すでにアカウントをお持ちの方はログイン' }}
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 左側：設定 -->
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4">🛠 基本設定</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">アイコン (Emoji)</label>
                            <input v-model="form.emoji" type="text" class="text-3xl w-16 h-16 text-center border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">メーカー名</label>
                            <input v-model="form.title" type="text" class="w-full p-3 border border-slate-300 rounded-xl font-bold" placeholder="例：関西弁おかんメーカー">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">説明文</label>
                            <input v-model="form.description" type="text" class="w-full p-3 border border-slate-300 rounded-xl" placeholder="短い説明...">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">ジャンル (1つ選択)</label>
                            <div class="flex flex-wrap gap-2">
                                <button
                                    v-for="cat in categories"
                                    :key="cat.id"
                                    type="button"
                                    @click="selectCategory(cat)"
                                    :class="['px-3 py-1.5 rounded-full text-xs font-bold border transition', form.category === cat.id ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-500 border-slate-200 hover:border-indigo-300']"
                                >
                                    {{ cat.label }}
                                </button>
                            </div>
                            <p class="text-[11px] text-slate-400 mt-1">最も適切なジャンルを選んでください。</p>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 ring-2 ring-indigo-50">
                    <h2 class="text-lg font-bold mb-2 text-indigo-700">🧠 AIへの指示 (プロンプト)</h2>
                    <textarea v-model="form.systemPrompt" class="w-full h-40 p-4 border border-indigo-200 rounded-xl focus:ring-2 focus:ring-indigo-500 resize-none bg-indigo-50/30 text-sm" placeholder="例：あなたは〇〇です。入力された文章を〇〇に変換してください。"></textarea>
                </div>
            </div>

            <!-- 右側：テスト -->
            <div class="space-y-6">
                <div class="bg-slate-800 text-white p-6 rounded-2xl shadow-xl">
                    <h2 class="text-lg font-bold mb-4">🧪 動作テスト</h2>
                    <input v-model="testInput" type="text" class="w-full p-3 bg-slate-700 border border-slate-600 rounded-xl text-white mb-2" placeholder="テスト用テキスト...">
                    <button @click="runTest" :disabled="!testInput || isLoading" class="w-full bg-indigo-500 hover:bg-indigo-400 text-white font-bold py-3 rounded-xl transition flex justify-center items-center gap-2">
                        <span v-if="isLoading" class="loader"></span>
                        <span v-if="!isLoading">テスト実行 ▶</span>
                    </button>
                    <div v-if="testResult" class="mt-6 pt-6 border-t border-slate-700 bg-slate-900 p-4 rounded-xl whitespace-pre-wrap">{{ testResult }}</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Environment Variables -->
    <script src="env.js"></script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { OPENROUTER_API_KEY, firebaseConfig, CATEGORIES } from './config.js';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    form: { emoji: '🐯', title: '', description: '', systemPrompt: '', category: 'other', tags: [] },
                    categories: CATEGORIES,
                    testInput: '', testResult: '', isLoading: false, isPublishing: false,
                    remixOriginId: null,
                    remixOriginTitle: null,
                    // Official Makers (for remix lookup)
                    officialMakers: [
                        { id: 'off_1', emoji: '😇', title: '聖人君子メール', description: '怒りを極めて冷静なビジネスメールに。', systemPrompt: 'あなたは超一流のビジネスマンです。感情的な文章を、意味を変えずに丁寧で円滑なビジネスメールに書き換えてください。' },
                        { id: 'off_2', emoji: '🍺', title: 'おじさん構文', description: '文章を絵文字多めの馴れ馴れしいおじさんに。', systemPrompt: '[役割]あなたは「おじさん構文専門変換AI」だ。どんな普通の日本語の文でも、徹底的にクセの強い「おじさん構文」へ変換せよ。ユーモア重視、ちょっと気持ち悪いくらい親しげで過剰な表現にすること。だが相手を中傷してはいけない（攻撃的に変えない）。[出力スタイル基本ルール]1. 絵文字・顔文字・記号を**多用**する（最低3つ以上、長文なら5〜10個程度）。例：😊😅✨✋☕️(｀･ω･´)ｷﾘｯ 2. 相手の名前は「◯◯チャン」や「◯◯さん」など親しげに。若い相手想定なら「〜チャン」をデフォルトにする。3. 句読点・改行を多用して**長めに**書く（1回の出力で3〜6文、場合によっては段落を分ける）。4. 文中に**カタカナ語を不自然に混ぜる**（例：「スゴイ」「サイコー」「ウレシイ」など）。確信度高く使う。5. 自分語り（「おじさんはね〜」「ところでオジサン、昨日…」）を必ず1箇所以上挿入する。6. 予防線（「冗談だよw」「ﾅﾝﾁｬｯﾃ」など）を1回以上入れて、軽い自己防衛を演出する。7. 文末は「〜だよ」「〜だよね！」「〜だゾ！」などカジュアルかつやや過剰に。語尾を**カタカナ化**する箇所を1〜2箇所入れる（例：「〜カナ？」「〜ダネ！」）。8. 小さな括弧や補足（(笑)・(汗)・（突然話題が変わる））を多用して余計な情報を追加する。9. 誘い文句（「今度ご飯行こう」「良かったら連絡ちょうだいね」）を必ず1つ含める。10. 禁止：差別的・暴力的な表現、個人情報の暴露、相手を侮辱することは禁止。性的に過度な表現は禁止。[変換手順（出力の指示）]- Step1: 入力文の意味（主旨）を損なわない範囲で保持する。- Step2: 上のルール1〜9を**すべて可能な限り**盛り込む（全部は無理でも多く適用）。- Step3: 最終的に「原文 → おじさん構文」の2行出力を必ず表示する（「元文:〜」「変換:〜」）。[フォーマット]出力は日本語。以下のテンプレートに合わせること：元文: 「（入力文そのまま）」変換: 「（おじさん構文に変換した文）」[例外処理]- 元文が短すぎる場合は情報を付け足して（自分語り・誘い・絵文字）1段落にまとめる。- 元文がビジネス文や機密文の場合は、まず「この文章はおじさん構文に変換して良いですか？」と確認する（安全のため）。[出力トーン]陽気で少しお節介、だが憎めない感じ。言い回しは古めのネットスラングやガラケー時代のノリを部分的に再現する。' },
                        { id: 'off_3', emoji: '🤓', title: 'オタク', description: '文章を早口なオタクに。', systemPrompt: '[役割]あなたは「早口オタク構文専門変換AI」である。入力された普通の日本語文を、知識量と熱量が暴走した「早口で喋ってそうなオタクの文章」に変換せよ。[文章の基本方針]・全体として「一息でまくし立てている印象」を最優先する・読みやすさは考慮しない（勢い優先）・相手がすべての前提知識を知っている体で話す[文体ルール]1. 句点「。」は極力使わない（0〜2個まで）2. 読点「、」で文を無限に接続する3. 一文は可能な限り長くする（最低でも3〜5行相当）4. 改行は使ってもよいが文は切らない[内容ルール]5. 専門用語・固有名詞・略語を説明なしで投入する6. 因果関係・比較・例外・補足を連鎖的に追加する7. 括弧による補足説明を多用する（しかもその中でさらに脱線する）8. 自己ツッコミや保険表現を必ず含める（例：「いや別に◯◯なんだけど」「語彙力なくて申し訳ないけど」）[感情・テンション]9. 熱量が高く、少し焦っている感じを出す10. 「これ重要だから言うけど」「ここ誤解されがちなんだけど」などの前置きを入れる11. 最後はやや投げやりに終わってよい（例：「って感じ」「伝われ」「わかる人にはわかる」）[出力形式]元文: 「入力された文章」変換: 「早口オタク構文に変換した文章」[禁止事項]・攻撃的、差別的、露骨に不快な表現は禁止・内容の事実関係は元文から逸脱しすぎない' },
                        { id: 'off_4', emoji: '🇺🇸', title: 'ネイティブ翻訳', description: '自然な英語表現に変換。', systemPrompt: '入力された文章を自然な英語に翻訳してください。' },
                        { id: 'off_5', emoji: '🌑', title: '厨二病メーカー', description: '日常会話を闇の住人の言葉に。', systemPrompt: '入力された文章を、難解な漢字やカタカナ用語を多用した、厨二病全開の言葉遣いに変換してください。' },
                        { id: 'off_6', emoji: '💖', title: 'ギャル語変換', description: 'テンション高めのギャル語に。', systemPrompt: '入力された文章を、絵文字たっぷりのハイテンションなギャル語に変換してください。' }
                    ],
                    // Auth State
                    user: null,
                    authInitialized: false,
                    authMode: 'login', // 'login' or 'register'
                    email: '',
                    password: '',
                    authError: '',
                    authLoading: false
                }
            },
            async mounted() {
                onAuthStateChanged(auth, (user) => {
                    this.user = user;
                    this.authInitialized = true;
                });

                // Remix Check
                const params = new URLSearchParams(window.location.search);
                const remixId = params.get('remix_id');

                if (remixId) {
                    try {
                        let makerData = null;

                        // Check Official
                        if (remixId.startsWith('off_')) {
                            makerData = this.officialMakers.find(m => m.id === remixId);
                        } else {
                            // Fetch from Firestore
                            const docRef = doc(db, "makers", remixId);
                            const docSnap = await getDoc(docRef);
                            if (docSnap.exists()) {
                                makerData = { id: docSnap.id, ...docSnap.data() };
                            }
                        }

                        if (makerData) {
                            this.form.emoji = makerData.emoji;
                            this.form.title = makerData.title; // User can rename
                            this.form.description = makerData.description;
                            this.form.systemPrompt = makerData.systemPrompt;
                            if (makerData.category) this.form.category = makerData.category;
                            if (makerData.tags && Array.isArray(makerData.tags)) {
                                this.form.tags = makerData.tags;
                            }

                            // 公式メーカーの場合はリミックス元として記録しない（セキュリティルール対応）
                            if (!makerData.id.startsWith('off_')) {
                                this.remixOriginId = makerData.id;
                                this.remixOriginTitle = makerData.title;
                            }
                        } else {
                            console.error("Remix source not found");
                        }
                    } catch (e) {
                        console.error("Error fetching remix source:", e);
                    }
                }
            },
            methods: {
                selectCategory(cat) {
                    this.form.category = cat.id;
                    // Auto-set tag for search compatibility
                    this.form.tags = [cat.label];
                },
                async runTest() {
                    if (!this.testInput) return;
                    this.isLoading = true;
                    this.testResult = '';
                    try {
                        if (!OPENROUTER_API_KEY) {
                            await new Promise(r => setTimeout(r, 1000));
                            this.testResult = "【デモ】APIキー未設定"; this.isLoading = false; return; 
                        }
                        const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
                                'HTTP-Referer': window.location.href, // OpenRouter requirement
                                'X-Title': 'TextMimic' // OpenRouter requirement
                            },
                            body: JSON.stringify({
                                model: "stepfun/step-3.5-flash:free",
                                messages: [ { role: "system", content: this.form.systemPrompt }, { role: "user", content: this.testInput } ],
                                temperature: 0.7
                            })
                        });

                        if (!response.ok) {
                            throw new Error(`API Error: ${response.status} ${response.statusText}`);
                        }

                        const data = await response.json();
                        if (!data.choices || !data.choices.length || !data.choices[0].message) {
                            console.error('Unexpected API response:', data);
                            throw new Error('APIからの応答形式が予期しないものでした。');
                        }
                        this.testResult = data.choices[0].message.content;
                    } catch (error) { alert("Error: " + error.message); } finally { this.isLoading = false; }
                },
                async publishMaker() {
                    if (!this.user) {
                        alert("ログインが必要です。");
                        return;
                    }
                    if(!this.form.title || !this.form.systemPrompt) { alert("タイトルとプロンプトは必須です"); return; }
                    this.isPublishing = true;
                    try {
                        // Firestoreにデータを保存
                        const payload = {
                            ...this.form,
                            createdAt: serverTimestamp(), // 作成日時
                            authorId: this.user.uid,
                            authorName: this.user.displayName || this.user.email || 'Anonymous',
                            remixOriginId: this.remixOriginId || null,
                            remixOriginTitle: this.remixOriginTitle || null,
                            likesCount: 0
                        };

                        await addDoc(collection(db, "makers"), payload);
                        alert("公開しました！🎉 ホームに戻ります。");
                        window.location.href = "index.html"; // ホームへリダイレクト
                    } catch (error) {
                        alert("保存エラー: " + error.message);
                        console.error(error);
                    } finally {
                        this.isPublishing = false;
                    }
                },
                // Auth Methods
                toggleAuthMode() {
                    this.authMode = this.authMode === 'login' ? 'register' : 'login';
                    this.authError = '';
                },
                async loginWithGoogle() {
                    const provider = new GoogleAuthProvider();
                    try {
                        await signInWithPopup(auth, provider);
                        // Auth state change will handle the rest
                    } catch (error) {
                        console.error(error);
                        this.authError = "Googleログインに失敗しました: " + error.message;
                    }
                },
                async handleEmailAuth() {
                    this.authLoading = true;
                    this.authError = '';
                    try {
                        if (this.authMode === 'login') {
                            await signInWithEmailAndPassword(auth, this.email, this.password);
                        } else {
                            await createUserWithEmailAndPassword(auth, this.email, this.password);
                        }
                    } catch (error) {
                        console.error(error);
                        let msg = error.code;
                        if(error.code === 'auth/email-already-in-use') msg = 'すでに登録されているメールアドレスです。';
                        else if(error.code === 'auth/wrong-password') msg = 'パスワードが間違っています。';
                        else if(error.code === 'auth/user-not-found') msg = 'ユーザーが見つかりません。';
                        else if(error.code === 'auth/weak-password') msg = 'パスワードが弱すぎます（6文字以上必要）。';
                        else if(error.code === 'auth/invalid-email') msg = 'メールアドレスの形式が正しくありません。';
                        this.authError = msg;
                    } finally {
                        this.authLoading = false;
                    }
                },
                async logout() {
                    try {
                        await signOut(auth);
                        // Block modal will reappear
                    } catch (error) {
                        alert("ログアウト失敗: " + error.message);
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
